<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ميموري — فلاشات الأفلام</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
--gold:#c9a84c;
--bg:#0a0a0f;
--card:#14141e;
--border:rgba(201,168,76,0.2);
--text:#f0ead6;
--muted:#8a8070;
--green:#2ecc71;
--red:#e74c3c;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
background:var(--bg);
color:var(--text);
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:1rem 2rem;
border-bottom:1px solid var(--border);
background:#111118;
}

.logo{
font-size:1.8rem;
font-weight:900;
color:var(--gold);
}

.hero{
text-align:center;
padding:5rem 2rem;
}

.hero h1{
font-size:3rem;
line-height:1.4;
}

.hero em{
color:var(--gold);
font-style:normal;
}

main{
max-width:860px;
margin:auto;
padding:2rem;
}

.step-card{
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
padding:1.5rem;
margin-bottom:1.5rem;
}

.section-title{
color:var(--gold);
margin-bottom:1rem;
font-weight:700;
}

.size-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
gap:.7rem;
}

.size-option{
background:#1a1a24;
border:1px solid var(--border);
border-radius:10px;
padding:1rem;
text-align:center;
cursor:pointer;
}

.size-option.selected{
border-color:var(--gold);
background:rgba(201,168,76,.12);
}

.movie-input-wrap{
display:flex;
gap:.5rem;
}

.movie-input-wrap input,
.contact-grid input,
.notes-area,
.login-card input{
width:100%;
background:#1a1a24;
border:1px solid var(--border);
color:white;
padding:.8rem;
border-radius:8px;
font-family:inherit;
}

.btn-add,
.btn-submit,
.login-card button,
.btn-back{
border:none;
border-radius:8px;
font-family:inherit;
cursor:pointer;
}

.btn-add,
.btn-submit,
.login-card button{
background:var(--gold);
color:black;
font-weight:bold;
}

.btn-add{
padding:0 1rem;
}

.btn-submit{
width:100%;
padding:1rem;
margin-top:1rem;
}

.movie-list{
list-style:none;
margin-top:1rem;
}

.movie-list li{
background:#1a1a24;
padding:.7rem 1rem;
border-radius:8px;
display:flex;
justify-content:space-between;
margin-bottom:.5rem;
}

.remove-btn{
background:none;
border:none;
color:var(--red);
cursor:pointer;
}

.contact-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:.7rem;
}

@media(max-width:600px){
.contact-grid{
grid-template-columns:1fr;
}
}

.notes-area{
min-height:90px;
margin-top:1rem;
}

.success-box{
display:none;
background:var(--card);
border:1px solid rgba(46,204,113,.4);
padding:2rem;
border-radius:14px;
text-align:center;
margin-top:1rem;
}

.wa-btn{
display:inline-block;
margin-top:1rem;
background:#25d366;
color:white;
padding:.8rem 1.5rem;
border-radius:10px;
text-decoration:none;
}

#admin-page{
display:none;
max-width:960px;
margin:auto;
padding:2rem;
}

.login-card{
background:var(--card);
border:1px solid var(--border);
padding:2rem;
border-radius:14px;
max-width:400px;
margin:4rem auto;
text-align:center;
}

.orders-grid{
display:flex;
flex-direction:column;
gap:1rem;
}

.order-card{
background:var(--card);
border:1px solid var(--border);
padding:1.5rem;
border-radius:12px;
}

.order-actions{
display:flex;
gap:.5rem;
margin-top:1rem;
flex-wrap:wrap;
}

.order-status,
.btn-delete,
.btn-wa{
padding:.5rem 1rem;
border:none;
border-radius:8px;
cursor:pointer;
}

.order-status.pending{
background:#f39c12;
color:white;
}

.order-status.done{
background:#2ecc71;
color:white;
}

.btn-delete{
background:#e74c3c;
color:white;
}

.btn-wa{
background:#25d366;
color:white;
text-decoration:none;
}

.admin-stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:1rem;
margin-bottom:1.5rem;
}

.stat-card{
background:var(--card);
border:1px solid var(--border);
padding:1rem;
border-radius:10px;
text-align:center;
}

.stat-card .num{
font-size:2rem;
color:var(--gold);
font-weight:900;
}
</style>
</head>

<body>

<nav>
<div class="logo">ميموري</div>
<a href="#" onclick="showAdmin()" style="color:white;text-decoration:none;">لوحة الإدارة</a>
</nav>

<div id="customer-page">

<div class="hero">
<h1>🎬 اختار أفلامك<br><em>واحنا نجهزهالك</em></h1>
</div>

<main>

<div class="step-card">

<div class="section-title">اختار حجم الفلاشة</div>

<div class="size-grid">

<div class="size-option" onclick="selectSize(this,'8GB')">8GB</div>
<div class="size-option" onclick="selectSize(this,'16GB')">16GB</div>
<div class="size-option" onclick="selectSize(this,'32GB')">32GB</div>
<div class="size-option" onclick="selectSize(this,'64GB')">64GB</div>
<div class="size-option" onclick="selectSize(this,'128GB')">128GB</div>

</div>

</div>

<div class="step-card">

<div class="section-title">الأفلام</div>

<div class="movie-input-wrap">

<input type="text" id="movie-input" placeholder="اسم الفيلم">

<button class="btn-add" onclick="addMovie()">+</button>

</div>

<ul class="movie-list" id="movie-list"></ul>

</div>

<div class="step-card">

<div class="section-title">بياناتك</div>

<div class="contact-grid">

<input type="text" id="cust-name" placeholder="اسمك">

<input type="tel" id="cust-phone" placeholder="رقم الهاتف">

</div>

<textarea class="notes-area" id="cust-notes" placeholder="ملاحظات إضافية"></textarea>

<button class="btn-submit" onclick="submitOrder()">إرسال الطلب</button>

<div class="success-box" id="success-box">

<h2>✅ تم استلام طلبك</h2>

<a id="wa-link" class="wa-btn" target="_blank">واتساب</a>

</div>

</div>

</main>

</div>

<div id="admin-page">

<div id="admin-login">

<div class="login-card">

<h2 style="margin-bottom:1rem;">لوحة الإدارة</h2>

<input type="password" id="admin-pass" placeholder="كلمة السر">

<button style="width:100%;margin-top:1rem;" onclick="tryLogin()">دخول</button>

</div>

</div>

<div id="admin-dashboard" style="display:none;">

<div class="admin-stats">

<div class="stat-card">
<div class="num" id="stat-total">0</div>
<div>إجمالي الطلبات</div>
</div>

<div class="stat-card">
<div class="num" id="stat-pending">0</div>
<div>طلبات جديدة</div>
</div>

<div class="stat-card">
<div class="num" id="stat-done">0</div>
<div>تم التنفيذ</div>
</div>

</div>

<div class="orders-grid" id="orders-grid"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
remove,
update
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyA_I2s7Gxnq2V9K0aYAD4gJxu2rIaRBkQI",
authDomain: "memory-6d391.firebaseapp.com",
databaseURL: "https://memory-6d391-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "memory-6d391",
storageBucket: "memory-6d391.firebasestorage.app",
messagingSenderId: "1092252388345",
appId: "1:1092252388345:web:bff80bb7b953915cb44b28"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ADMIN_PASSWORD = 'memoory2025';
const WA_NUMBER = '201109181065';

let selectedSize = '';
let movies = [];
let orders = [];

window.selectSize = function(el,size){

document.querySelectorAll('.size-option')
.forEach(e=>e.classList.remove('selected'));

el.classList.add('selected');

selectedSize = size;

}

window.addMovie = function(){

const input = document.getElementById('movie-input');

const val = input.value.trim();

if(!val) return;

movies.push(val);

input.value='';

renderMovies();

}

window.removeMovie = function(i){

movies.splice(i,1);

renderMovies();

}

function renderMovies(){

document.getElementById('movie-list').innerHTML = movies.map((m,i)=>`

<li>

<span>🎬 ${m}</span>

<button class="remove-btn"
onclick="removeMovie(${i})">

✕

</button>

</li>

`).join('');

}

window.submitOrder = function(){

const name = document.getElementById('cust-name').value.trim();

const phone = document.getElementById('cust-phone').value.trim();

const notes = document.getElementById('cust-notes').value.trim();

if(!selectedSize){
alert('اختار حجم الفلاشة');
return;
}

if(movies.length===0){
alert('ضيف فيلم');
return;
}

if(!name || !phone){
alert('اكتب بياناتك');
return;
}

const order = {

name,
phone,
notes,
size:selectedSize,
movies:[...movies],
status:'pending',
date:new Date().toLocaleString('ar-EG')

};

push(ref(db,'orders'),order);

const msg = encodeURIComponent(
`مرحبا 👋

📦 ${selectedSize}

🎬
${movies.join('\n')}`
);

document.getElementById('wa-link').href =
`https://wa.me/${WA_NUMBER}?text=${msg}`;

document.getElementById('success-box')
.style.display='block';

movies=[];

renderMovies();

}

window.showAdmin = function(){

document.getElementById('customer-page')
.style.display='none';

document.getElementById('admin-page')
.style.display='block';

}

window.tryLogin = function(){

const pass =
document.getElementById('admin-pass').value;

if(pass===ADMIN_PASSWORD){

document.getElementById('admin-login')
.style.display='none';

document.getElementById('admin-dashboard')
.style.display='block';

}else{

alert('كلمة السر غلط');

}

}

onValue(ref(db,'orders'),(snapshot)=>{

orders=[];

snapshot.forEach((child)=>{

orders.unshift({

firebaseId:child.key,

...child.val()

});

});

renderOrders();

});

function renderOrders(){

const grid = document.getElementById('orders-grid');

const pending =
orders.filter(o=>o.status==='pending').length;

document.getElementById('stat-total')
.textContent = orders.length;

document.getElementById('stat-pending')
.textContent = pending;

document.getElementById('stat-done')
.textContent = orders.length-pending;

grid.innerHTML = orders.map((o,i)=>`

<div class="order-card">

<h3>👤 ${o.name}</h3>

<p>📞 ${o.phone}</p>

<p>💾 ${o.size}</p>

<p>${o.date}</p>

<div style="margin-top:.7rem;">

${o.movies.map(m=>`

<span style="
background:#1a1a24;
padding:.3rem .7rem;
border-radius:6px;
display:inline-block;
margin:.2rem;">

🎬 ${m}

</span>

`).join('')}

</div>

<div class="order-actions">

<button
class="order-status ${o.status==='done'?'done':'pending'}"
onclick="toggleStatus(${i})">

${o.status==='done'?'تم التنفيذ':'جديد'}

</button>

<a class="btn-wa"
href="https://wa.me/${o.phone}"
target="_blank">

واتساب

</a>

<button
class="btn-delete"
onclick="deleteOrder(${i})">

حذف

</button>

</div>

</div>

`).join('');

}

window.toggleStatus = function(i){

const newStatus =
orders[i].status==='pending'
?'done'
:'pending';

update(
ref(db,'orders/' + orders[i].firebaseId),
{
status:newStatus
}
);

}

window.deleteOrder = function(i){

remove(
ref(db,'orders/' + orders[i].firebaseId)
);

}

</script>

</body>
</html>
