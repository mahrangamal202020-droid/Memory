<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ميموري — فلاشات الأفلام</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#0f0f14;
color:white;
}

nav{
padding:15px 20px;
background:#15151d;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
}

.logo{
font-size:24px;
font-weight:900;
color:#d4af37;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#171720;
padding:20px;
border-radius:14px;
margin-bottom:20px;
border:1px solid #2a2a35;
}

h2{
color:#d4af37;
}

.size-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

.size-option{
background:#22222e;
padding:20px;
text-align:center;
border-radius:10px;
cursor:pointer;
border:2px solid transparent;
}

.selected{
border-color:#d4af37;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
background:#22222e;
border:none;
border-radius:10px;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.main-btn{
background:#d4af37;
color:black;
width:100%;
margin-top:15px;
}

.movie-list li{
background:#22222e;
padding:10px;
border-radius:8px;
margin-top:10px;
display:flex;
justify-content:space-between;
}

#admin-page{
display:none;
}

.order-card{
background:#171720;
padding:20px;
border-radius:14px;
margin-bottom:15px;
border:1px solid #2a2a35;
}

.status-btn{
background:#333;
color:white;
}

.delete-btn{
background:#c0392b;
color:white;
}

</style>
</head>
<body>

<nav>
<div class="logo">ميموري</div>
<button onclick="showAdmin()">لوحة الإدارة</button>
</nav>

<div id="customer-page" class="container">

<div class="card">

<h2>اختار حجم الفلاشة</h2>

<div class="size-grid">

<div class="size-option" onclick="selectSize(this,'8GB')">8GB</div>
<div class="size-option" onclick="selectSize(this,'16GB')">16GB</div>
<div class="size-option" onclick="selectSize(this,'32GB')">32GB</div>
<div class="size-option" onclick="selectSize(this,'64GB')">64GB</div>

</div>

</div>

<div class="card">

<h2>الأفلام</h2>

<input type="text" id="movie-input" placeholder="اسم الفيلم">

<button class="main-btn" onclick="addMovie()">إضافة فيلم</button>

<ul class="movie-list" id="movie-list"></ul>

</div>

<div class="card">

<h2>بياناتك</h2>

<input type="text" id="cust-name" placeholder="اسمك">

<input type="tel" id="cust-phone" placeholder="رقم الهاتف">

<textarea id="cust-notes" placeholder="ملاحظات"></textarea>

<button class="main-btn" onclick="submitOrder()">إرسال الطلب</button>

</div>

</div>

<div id="admin-page" class="container">

<div class="card">

<h2>لوحة الإدارة</h2>

<input type="password" id="admin-pass" placeholder="كلمة السر">

<button class="main-btn" onclick="login()">دخول</button>

</div>

<div id="dashboard" style="display:none;">

<div id="orders"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
remove,
update
} from "https://www.gstatic.com/firebasejs/12.3.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyA_I2s7Gxnq2V9K0aYAD4gJxu2rIaRBkQI",

authDomain: "memory-6d391.firebaseapp.com",

databaseURL: "https://memory-6d391-default-rtdb.europe-west1.firebasedatabase.app",

projectId: "memory-6d391",

storageBucket: "memory-6d391.firebasestorage.app",

messagingSenderId: "1092252388345",

appId: "1:1092252388345:web:bff80bb7b953915cb44b28"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

let selectedSize = "";

let movies = [];

let orders = [];

window.selectSize = function(el,size){

document.querySelectorAll(".size-option")
.forEach(e=>e.classList.remove("selected"));

el.classList.add("selected");

selectedSize = size;

}

window.addMovie = function(){

const input = document.getElementById("movie-input");

if(!input.value.trim()) return;

movies.push(input.value.trim());

input.value = "";

renderMovies();

}

function renderMovies(){

const list = document.getElementById("movie-list");

list.innerHTML = movies.map((m,i)=>`

<li>

${m}

<button onclick="removeMovie(${i})">✕</button>

</li>

`).join("");

}

window.removeMovie = function(i){

movies.splice(i,1);

renderMovies();

}

window.submitOrder = function(){

const name = document.getElementById("cust-name").value;

const phone = document.getElementById("cust-phone").value;

const notes = document.getElementById("cust-notes").value;

if(!selectedSize){
alert("اختار حجم الفلاشة");
return;
}

if(movies.length === 0){
alert("ضيف فيلم");
return;
}

const order = {

name,

phone,

notes,

size:selectedSize,

movies,

status:"pending",

date:new Date().toLocaleString("ar-EG")

};

push(ref(db,"orders"),order);

alert("تم إرسال الطلب");

movies = [];

renderMovies();

}

window.showAdmin = function(){

document.getElementById("customer-page").style.display = "none";

document.getElementById("admin-page").style.display = "block";

}

window.login = function(){

const pass = document.getElementById("admin-pass").value;

if(pass !== "memoory2025"){

alert("كلمة السر غلط");

return;

}

document.getElementById("dashboard").style.display = "block";

}

onValue(ref(db,"orders"),(snapshot)=>{

orders = [];

snapshot.forEach((child)=>{

orders.unshift({

id:child.key,

...child.val()

});

});

renderOrders();

});

function renderOrders(){

const container = document.getElementById("orders");

if(orders.length === 0){

container.innerHTML = "لا يوجد طلبات";

return;

}

container.innerHTML = orders.map((o,i)=>`

<div class="order-card">

<h3>${o.name}</h3>

<p>📞 ${o.phone}</p>

<p>💾 ${o.size}</p>

<p>${o.movies.join(" , ")}</p>

<p>${o.date}</p>

<button class="status-btn"
onclick="toggleStatus(${i})">

${o.status === "done" ? "تم التنفيذ" : "جديد"}

</button>

<button class="delete-btn"
onclick="deleteOrder(${i})">

حذف

</button>

</div>

`).join("");

}

window.toggleStatus = function(i){

const newStatus = orders[i].status === "pending"
? "done"
: "pending";

update(
ref(db,"orders/" + orders[i].id),
{
status:newStatus
}
);

}

window.deleteOrder = function(i){

remove(
ref(db,"orders/" + orders[i].id)
);

}

</script>

</body>
</html>
