<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ميموري — فلاشات الأفلام</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #9a7a30;
    --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24; --card: #14141e;
    --border: rgba(201,168,76,0.2); --text: #f0ead6; --muted: #8a8070;
    --green: #2ecc71; --red: #e74c3c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* باقي الـ CSS كامل (نفس السابق) */
  nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.95); position: sticky; top:0; z-index:100; backdrop-filter: blur(8px); }
  .logo { font-size: 1.8rem; font-weight: 900; color: var(--gold); letter-spacing: 2px; text-shadow: 0 0 20px rgba(201,168,76,0.4); }
  .logo span { color: var(--text); font-weight: 400; font-size: 0.8rem; display:block; letter-spacing:1px; }
  nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; padding: 0.4rem 1rem; border: 1px solid transparent; border-radius: 6px; transition: all 0.2s; }
  nav a:hover { color: var(--gold); border-color: var(--border); }

  .hero { text-align: center; padding: 5rem 2rem 3rem; background: radial-gradient(ellipse at top, rgba(201,168,76,0.08) 0%, transparent 60%); border-bottom: 1px solid var(--border); }
  .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; line-height: 1.2; margin-bottom: 1rem; }
  .hero h1 em { color: var(--gold); font-style: normal; }
  .hero p { color: var(--muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto 2rem; }
  .hero-badges { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
  .badge { background: var(--bg3); border: 1px solid var(--border); padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.85rem; color: var(--gold-light); }

  main { max-width: 860px; margin: 0 auto; padding: 3rem 1.5rem; }
  .section-title { font-size: 1rem; font-weight: 600; color: var(--gold); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .section-title::before { content:''; display:inline-block; width:4px; height:18px; background: var(--gold); border-radius: 2px; }

  .step-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.8rem; margin-bottom: 1.5rem; }
  .size-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.75rem; margin-top: 0.75rem; }
  .size-option { cursor: pointer; background: var(--bg3); border: 1.5px solid var(--border); border-radius: 10px; padding: 1rem 0.5rem; text-align: center; transition: all 0.2s; }
  .size-option:hover { border-color: var(--gold-dark); background: rgba(201,168,76,0.06); }
  .size-option.selected { border-color: var(--gold); background: rgba(201,168,76,0.12); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
  .size-option .gb { font-size: 1.5rem; font-weight: 900; color: var(--gold); display:block; }
  .size-option .lbl, .size-option .movies { font-size: 0.78rem; color: var(--muted); }

  .movie-input-wrap { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
  .movie-input-wrap input { flex:1; background: var(--bg3); border:1px solid var(--border); color:var(--text); padding:0.65rem 1rem; border-radius:8px; }
  .btn-add { background:var(--gold); color:#000; border:none; padding:0 1.2rem; border-radius:8px; cursor:pointer; font-weight:700; }

  .movie-list { list-style:none; display:flex; flex-direction:column; gap:0.4rem; }
  .movie-list li { display:flex; justify-content:space-between; background:var(--bg3); border:1px solid var(--border); padding:0.55rem 1rem; border-radius:8px; }

  .contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; }
  .notes-area, .contact-grid input { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:0.75rem; border-radius:8px; width:100%; }

  .btn-submit { width:100%; padding:1rem; background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:#000; border:none; border-radius:10px; font-weight:900; margin-top:1.5rem; cursor:pointer; }
  .success-box { display:none; text-align:center; padding:3rem 2rem; background:var(--card); border:1px solid rgba(46,204,113,0.3); border-radius:14px; margin-top:1.5rem; }

  .summary-pill { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); background:var(--card); border:1px solid var(--border); border-radius:50px; padding:0.6rem 1.5rem; z-index:200; }

  /* Admin Styles */
  #admin-page { display:none; }
  .order-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-bottom:1rem; }
</style>
</head>
<body>

<nav>
  <div class="logo">ميموري<span>فلاشات الأفلام بالطلب</span></div>
  <a href="#" onclick="showAdmin()">لوحة الإدارة</a>
</nav>

<div id="customer-page">
  <!-- كل الـ HTML السابق (الـ hero + steps + success) بدون تغيير -->
  <!-- ... (انسخ الجزء ده من الملف القديم) ... -->
  <!-- للاختصار، افترض إنك هتحطه كامل -->

  <main>
    <!-- STEP 1, 2, 3 ... (نفس الكود السابق) -->
    <!-- ... -->
    <button class="btn-submit" onclick="submitOrder()">📤 اتلم الطلب</button>
    <div class="success-box" id="success-box"> ... </div>
  </main>
</div>

<div id="admin-page">
  <div id="admin-login"> ... (نفس الكود) </div>
  <div id="admin-dashboard" style="display:none;">
    <div class="admin-header">
      <h2>📋 لوحة الطلبات</h2>
      <button onclick="showCustomer()">رجوع</button>
    </div>
    <div class="orders-grid" id="orders-grid"></div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxPOqzdQTOoeeMQCkB9nOrLve-bG-rVac0b-LYZRZ0nErSJe3LJFpaT_Mc3gzVhDhtiA/exec";
const WA_NUMBER = '201109181065';
const ADMIN_PASSWORD = 'memoory2025';

let selectedSize = '';
let movies = [];
let orders = [];

// باقي الدوال (selectSize, addMovie, renderMovies, updatePill...) كما هي

async function submitOrder() {
  // ... نفس الكود السابق (التحقق + إرسال) ...
  const order = { /* ... */ };

  try {
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(order), headers: {'Content-Type': 'application/json'} });
    console.log("✅ Sent to Google Sheet");
  } catch(e) { console.log("POST Error", e); }

  orders.unshift(order);
  localStorage.setItem('memory_orders', JSON.stringify(orders));

  // success box
  document.getElementById('success-box').style.display = 'block';
}

async function loadOrders() {
  const grid = document.getElementById('orders-grid');
  grid.innerHTML = "<p>جاري تحميل الطلبات...</p>";

  try {
    const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
    if (res.ok) {
      orders = await res.json();
      console.log("Loaded from Sheet:", orders);
    }
  } catch (e) {
    console.log("Sheet failed, using local");
    orders = JSON.parse(localStorage.getItem('memory_orders') || '[]');
  }

  renderOrders();
}

function renderOrders() {
  const grid = document.getElementById('orders-grid');
  if (orders.length === 0) {
    grid.innerHTML = '<div class="empty-orders">لا يوجد طلبات بعد</div>';
    return;
  }
  // ... نفس renderOrders السابق ...
}

function showAdmin() {
  document.getElementById('customer-page').style.display = 'none';
  document.getElementById('admin-page').style.display = 'block';
  loadOrders();
}

// باقي الدوال (tryLogin, showCustomer, toggleStatus, etc.)
</script>
</body>
</html>
